name: Docker CI

on:
  push:
    branches: [master, develop, desarrollo]
  pull_request:
    branches: [master, develop, desarrollo]

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          tags: dockershield:ci

      - name: Check container starts
        run: |
          docker run -d --name dockershield-test -p 8000:8000 dockershield:ci
          sleep 5
          docker logs dockershield-test 2>&1
          echo "✅ Container started successfully"
          docker stop dockershield-test
          docker rm dockershield-test

      - name: Run Django system checks
        run: |
          docker run --rm dockershield:ci python manage.py check

      - name: Verify requirements installed
        run: |
          docker run --rm dockershield:ci pip list --format=columns
