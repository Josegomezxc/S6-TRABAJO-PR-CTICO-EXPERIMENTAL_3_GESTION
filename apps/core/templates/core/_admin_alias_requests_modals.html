{% comment %}
Contenido de los modales — un <template> por cada solicitud visible.
La fila correspondiente tiene data-modal-target="aar-detail-N" que apunta
a su template, y al hacer click el JS clona el contenido al modal global.

  - Pending → action form (stepper de cantidad + note chips + approve/reject)
  - Resuelta → vista de detalle (timeline + decisión + justificación)
{% endcomment %}
{% for req in requests %}
<template id="aar-detail-{{ req.id }}">

  {% if req.status == 'pending' %}
    {# ─── MODAL: form de aprobación (solicitud pendiente) ─── #}
    <div class="aar-mb-strip aar-mb-strip--pending"></div>

    <div class="aar-mb-head">
      <div class="aar-mb-avatar">{{ req.user.email|first|upper }}</div>
      <div class="aar-mb-titles">
        <div class="aar-mb-name">{{ req.user.get_full_name|default:req.user.username }}</div>
        <div class="aar-mb-email">{{ req.user.email }}</div>
        <span class="aar-mb-badge aar-mb-badge--pending">
          <span class="aar-pulse"></span>
          Pendiente · pidió +{{ req.requested_amount }}
        </span>
      </div>
    </div>

    <div class="aar-section">
      <div class="aar-section-lbl">Justificación del usuario</div>
      <div class="aar-section-body">
        {% if req.reason %}{{ req.reason }}{% else %}<em class="aar-empty-reason">(sin justificación)</em>{% endif %}
      </div>
    </div>

    <form method="post" action="{% url 'admin_alias_request_resolve' req.pk %}"
          class="aar-action-form js-aar-form"
          data-requested="{{ req.requested_amount }}">
      {% csrf_token %}

      <div class="aar-action-section">
        <div class="aar-action-section-head">
          <svg class="aar-action-section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
            <line x1="17.5" y1="14" x2="17.5" y2="21"/>
            <line x1="14" y1="17.5" x2="21" y2="17.5"/>
          </svg>
          <span class="aar-action-section-title">¿Cuánto le concedés?</span>
          <span class="aar-action-section-meta">Pidió <strong>+{{ req.requested_amount }}</strong> · podés dar más o menos</span>
        </div>

        <div class="aar-grant-row">
          <div class="aar-grant-stepper">
            <button type="button" class="aar-step-btn" aria-label="Restar 1" onclick="aarStepGrant(this, -1)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2"
                   name="granted"
                   value="{{ req.requested_amount }}"
                   class="aar-grant-input js-aar-grant-input"
                   data-min="1" data-max="50"
                   onkeydown="return aarOnlyDigits(event)"
                   onpaste="aarOnPaste(event)"
                   oninput="aarOnGrantInput(this)">
            <button type="button" class="aar-step-btn" aria-label="Sumar 1" onclick="aarStepGrant(this, 1)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>

          <div class="aar-grant-delta js-aar-delta is-equal" data-requested="{{ req.requested_amount }}">
            <div class="aar-delta-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <div class="aar-delta-body">
              <div class="aar-delta-headline">Igual a lo pedido</div>
              <div class="aar-delta-hint">El usuario recibe exactamente lo que solicitó.</div>
            </div>
          </div>

          <span class="js-aar-preview-amount" hidden>+{{ req.requested_amount }}</span>
        </div>
      </div>

      <div class="aar-action-section">
        <div class="aar-action-section-head">
          <svg class="aar-action-section-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="aar-action-section-title">Nota para el usuario</span>
          <span class="aar-action-section-meta">opcional · le llegará por notificación</span>
        </div>

        <div class="aar-note-wrap">
          <div class="aar-note-chips" role="group" aria-label="Notas comunes">
            <button type="button" class="aar-note-chip" data-tone="approve"
                    onclick="aarSetNote(this, 'Aprobado. Si necesitás más en el futuro, podés pedir otra vez.')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              Aprobado
            </button>
            <button type="button" class="aar-note-chip" data-tone="reduce"
                    onclick="aarSetNote(this, 'Te concedo menos de lo que pediste. Si los usas todos, pedí más después.')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Te doy menos
            </button>
            <button type="button" class="aar-note-chip" data-tone="caution"
                    onclick="aarSetNote(this, 'Vamos a probar primero con este cupo. Si te queda chico, pedí más adelante.')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Probemos primero
            </button>
            <button type="button" class="aar-note-chip" data-tone="info"
                    onclick="aarSetNote(this, 'Necesito más información sobre el uso que les vas a dar. Respondé al admin con detalles.')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
              Más info
            </button>
            <button type="button" class="aar-note-chip" data-tone="reject"
                    onclick="aarSetNote(this, 'No puedo concederte más cupo en este momento. Probá usar mejor los que ya tenés.')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              No esta vez
            </button>
          </div>

          <textarea name="admin_note" rows="2" maxlength="500"
                    class="aar-note-textarea js-aar-note"
                    readonly
                    tabindex="-1"
                    placeholder="Tocá un chip arriba para elegir tu respuesta. No se permite escribir libre."></textarea>
        </div>
      </div>

      <div class="aar-action-buttons">
        <button type="submit" name="action" value="reject" class="aar-btn-reject"
                data-user-email="{{ req.user.email }}"
                onclick="return aarConfirmReject(event, this)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Rechazar
        </button>
        <button type="submit" name="action" value="approve" class="aar-btn-approve"
                data-user-email="{{ req.user.email }}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Aprobar <strong class="js-aar-btn-amount">+{{ req.requested_amount }}</strong>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    </form>

  {% else %}
    {# ─── MODAL: detalle de resolución (approved/rejected) ─── #}
    <div class="aar-mb-strip aar-mb-strip--{{ req.status }}"></div>

    <div class="aar-mb-head">
      <div class="aar-mb-avatar">{{ req.user.email|first|upper }}</div>
      <div class="aar-mb-titles">
        <div class="aar-mb-name">{{ req.user.get_full_name|default:req.user.username }}</div>
        <div class="aar-mb-email">{{ req.user.email }}</div>
        {% if req.status == 'approved' %}
          <span class="aar-mb-badge aar-mb-badge--approved">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Solicitud aprobada
          </span>
        {% else %}
          <span class="aar-mb-badge aar-mb-badge--rejected">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Solicitud rechazada
          </span>
        {% endif %}
      </div>
    </div>

    <div class="aar-mb-decision">
      <div class="aar-mb-side aar-mb-side--ask">
        <div class="aar-mb-side-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
          </svg>
        </div>
        <div class="aar-mb-side-lbl">Pidió</div>
        <div class="aar-mb-side-num">+{{ req.requested_amount }}</div>
        <div class="aar-mb-side-sub">alias</div>
      </div>

      <svg class="aar-mb-decision-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
      </svg>

      <div class="aar-mb-side aar-mb-side--{{ req.status }}">
        <div class="aar-mb-side-icon">
          {% if req.status == 'approved' %}
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          {% else %}
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          {% endif %}
        </div>
        <div class="aar-mb-side-lbl">Le diste</div>
        <div class="aar-mb-side-num">{% if req.status == 'approved' %}+{{ req.granted_amount }}{% else %}0{% endif %}</div>
        <div class="aar-mb-side-sub">{% if req.status == 'approved' %}alias adicionales{% else %}no se concedió{% endif %}</div>
      </div>
    </div>

    <div class="aar-mb-block aar-mb-block--user">
      <div class="aar-mb-block-head">
        <svg class="aar-mb-block-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
        </svg>
        <span class="aar-mb-block-title">Lo que dijo el usuario</span>
      </div>
      <div class="aar-mb-quote">
        <svg class="aar-mb-quote-mark" viewBox="0 0 24 24" fill="currentColor">
          <path d="M9.983 3v7.391c0 5.704-3.731 9.57-8.983 10.609l-.995-2.151c2.432-.917 3.995-3.638 3.995-5.849h-4v-10h9.983zm14.017 0v7.391c0 5.704-3.748 9.571-9 10.609l-.996-2.151c2.433-.917 3.996-3.638 3.996-5.849h-3.983v-10h9.983z"/>
        </svg>
        <div class="aar-mb-quote-text">{% if req.reason %}{{ req.reason }}{% else %}<em class="aar-empty-reason">(no dejó justificación)</em>{% endif %}</div>
      </div>
    </div>

    {% if req.admin_note %}
    <div class="aar-mb-block aar-mb-block--mine">
      <div class="aar-mb-block-head">
        <svg class="aar-mb-block-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        <span class="aar-mb-block-title">Tu respuesta{% if req.resolved_by %} <span class="aar-mb-block-meta">como {{ req.resolved_by.username }}</span>{% endif %}</span>
      </div>
      <div class="aar-mb-mynote">{{ req.admin_note }}</div>
    </div>
    {% endif %}

    <footer class="aar-mb-foot">
      <div class="aar-mb-timeline aar-mb-timeline--{{ req.status }}">
        <div class="aar-mb-tl-step">
          <div class="aar-mb-tl-dot aar-mb-tl-dot--start">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
          </div>
          <div class="aar-mb-tl-content">
            <div class="aar-mb-tl-label">Solicitada</div>
            <div class="aar-mb-tl-time"><strong>{{ req.created_at|timesince }}</strong> atrás</div>
          </div>
        </div>

        <div class="aar-mb-tl-line" aria-hidden="true"></div>

        <div class="aar-mb-tl-step aar-mb-tl-step--end">
          <div class="aar-mb-tl-dot aar-mb-tl-dot--{{ req.status }}">
            {% if req.status == 'approved' %}
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            {% else %}
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            {% endif %}
          </div>
          <div class="aar-mb-tl-content">
            <div class="aar-mb-tl-label">{% if req.status == 'approved' %}Aprobada{% else %}Rechazada{% endif %}</div>
            <div class="aar-mb-tl-time">
              {% if req.resolved_at %}<strong>{{ req.resolved_at|timesince }}</strong> atrás{% endif %}
              {% if req.resolved_by %} · <strong>{{ req.resolved_by.username }}</strong>{% endif %}
            </div>
          </div>
        </div>
      </div>
    </footer>
  {% endif %}

</template>
{% endfor %}
